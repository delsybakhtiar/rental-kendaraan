# ===========================================================
# Nginx Reverse Proxy Configuration
# Car Rental Tracking System
# ===========================================================
#
# Installation:
# 1. Copy this file to /etc/nginx/sites-available/car-rental
# 2. Create symlink: sudo ln -s /etc/nginx/sites-available/car-rental /etc/nginx/sites-enabled/
# 3. Test config: sudo nginx -t
# 4. Reload Nginx: sudo systemctl reload nginx
#
# ===========================================================

# Upstream for main Next.js application
upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Upstream for tracking service
upstream tracking_service {
    server 127.0.0.1:3003;
    keepalive 32;
}

# HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server - Main Application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ===========================================================
    # SSL Configuration (Let's Encrypt)
    # ===========================================================
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # SSL Session Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ===========================================================
    # Security Headers
    # ===========================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # ===========================================================
    # Rate Limiting (additional layer)
    # ===========================================================
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_status 429;

    # ===========================================================
    # Logging
    # ===========================================================
    access_log /var/log/nginx/car-rental-access.log;
    error_log /var/log/nginx/car-rental-error.log;

    # ===========================================================
    # Gzip Compression
    # ===========================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ===========================================================
    # Main Application (Port 3000)
    # ===========================================================
    location / {
        limit_req zone=general burst=20 nodelay;
        
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        
        # Headers for proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ===========================================================
    # Tracking Service API (Port 3003)
    # ===========================================================
    location /tracking-service/ {
        limit_req zone=general burst=10 nodelay;
        
        # Rewrite path
        rewrite ^/tracking-service/(.*) /$1 break;
        
        proxy_pass http://tracking_service;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ===========================================================
    # Authentication endpoints - Stricter rate limiting
    # ===========================================================
    location ~ ^/(api/auth/login|api/auth/register) {
        limit_req zone=auth burst=5 nodelay;
        
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===========================================================
    # Health Check Endpoint (no rate limiting)
    # ===========================================================
    location /health {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        access_log off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ===========================================================
    # Static files caching
    # ===========================================================
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        
        # Cache static assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ===========================================================
    # Block access to hidden files
    # ===========================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to sensitive files
    location ~* \.(env|git|gitignore|dockerignore|md)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ===========================================================
# Rate Limit Error Page
# ===========================================================
server {
    listen 8080;
    server_name localhost;
    
    location / {
        default_type application/json;
        return 429 '{"success":false,"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
    }
}
